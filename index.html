<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Bet Pro - Predictor</title>
    <style>
        :root { --red: #ff3131; --dark: #0a0a0a; --card: #161616; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; text-align: center; overflow-x: hidden; }
        
        .container { max-width: 450px; margin: auto; padding: 15px; min-height: 90vh; }
        .page { display: none; animation: fadeIn 0.3s ease-in; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Style ho an'ny Input Page */
        .card { background: var(--card); border-radius: 25px; padding: 25px; border: 1px solid #222; margin-top: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .label { color: #888; font-size: 0.8rem; font-weight: bold; letter-spacing: 1px; margin-bottom: 5px; display: block; }
        .input-box { background: #111; padding: 18px; border-radius: 15px; margin-bottom: 20px; font-family: monospace; font-size: 1.5rem; border: 2px solid #333; cursor: pointer; transition: 0.3s; }
        .selected { border-color: var(--red); background: #1a0a0a; box-shadow: 0 0 15px rgba(255, 49, 49, 0.2); }

        /* Keypad */
        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .key { background: #222; padding: 18px 5px; border-radius: 12px; border: none; color: white; font-weight: bold; font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .key:active { background: #444; transform: scale(0.95); }
        .btn-action { border: none; padding: 18px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; font-size: 1rem; margin-top: 15px; transition: 0.3s; }
        .btn-fafana { background: #333; color: white; }
        .btn-vinavina { background: var(--red); color: white; box-shadow: 0 4px 15px rgba(255, 49, 49, 0.4); }

        /* STYLE SIGNAL LIVE (Mitovy amin'ny sary) */
        .signal-screen { 
            background: radial-gradient(circle at center, #251010 0%, #0a0a0a 100%); 
            border-radius: 30px; padding: 50px 15px; border: 1px solid #333; 
            position: relative; overflow: hidden; min-height: 420px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .lion-bg { font-size: 12rem; opacity: 0.08; position: absolute; z-index: 0; pointer-events: none; }
        .live-tag { background: var(--red); padding: 6px 16px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; margin-bottom: 20px; z-index: 1; display: flex; align-items: center; gap: 5px; }
        
        .predicted-time { font-size: 4.5rem; font-weight: bold; color: var(--red); z-index: 1; font-family: monospace; text-shadow: 0 0 25px rgba(255, 49, 49, 0.5); margin: 15px 0; }
        
        /* Tour Badges */
        .tour-badge { padding: 8px 25px; border-radius: 25px; font-weight: bold; font-size: 0.9rem; z-index: 1; border: 1.5px solid; display: flex; align-items: center; gap: 8px; margin-bottom: 30px; }
        .tsara { color: white; border-color: white; }
        .vert { color: #2ecc71; border-color: #2ecc71; }
        .ratsy { color: #ff3131; border-color: #ff3131; }
        .bleu { color: #3498db; border-color: #3498db; }

        .cotes-row { display: flex; justify-content: center; gap: 25px; width: 100%; z-index: 1; font-weight: bold; font-size: 1rem; }
        .pink { color: #e056fd; }

        .btn-hiverina { background: #1a1a1a; color: white; border: 1px solid #333; padding: 15px; border-radius: 12px; width: 100%; margin-top: 25px; font-weight: bold; cursor: pointer; }

        /* Navigation */
        nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 450px; background: #0f0f0f; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; }
        .nav-item { font-size: 1.5rem; cursor: pointer; opacity: 0.4; transition: 0.3s; }
        .nav-active { opacity: 1; color: var(--red); }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="p-home" class="page active">
            <h1 style="color:var(--red); letter-spacing: 2px; margin-bottom: 5px;">BOSS BET</h1>
            <p style="color: #666; font-size: 0.7rem; margin-top: 0; margin-bottom: 20px;">AVIATOR PREDICTOR</p>
            
            <div class="card">
                <span class="label">ORA FIAINGANA</span>
                <div id="box-time" class="input-box selected" onclick="mifidy('time')">HH : MM : SS</div>
                
                <span class="label">VOAN'NY SERVER (HEX)</span>
                <div id="box-hex" class="input-box" onclick="mifidy('hex')">6 litera hex</div>
                
                <div class="keypad">
                    <button class="key" onclick="press('1')">1</button><button class="key" onclick="press('2')">2</button><button class="key" onclick="press('3')">3</button><button class="key" onclick="press('4')">4</button>
                    <button class="key" onclick="press('5')">5</button><button class="key" onclick="press('6')">6</button><button class="key" onclick="press('7')">7</button><button class="key" onclick="press('8')">8</button>
                    <button class="key" onclick="press('9')">9</button><button class="key" onclick="press('0')">0</button><button class="key" onclick="press('A')">A</button><button class="key" onclick="press('B')">B</button>
                    <button class="key" onclick="press('C')">C</button><button class="key" onclick="press('D')">D</button><button class="key" onclick="press('E')">E</button><button class="key" onclick="press('F')">F</button>
                </div>
                
                <div style="display: flex; gap: 10px;">
                    <button class="btn-action btn-fafana" onclick="mamafa()">FAFANA</button>
                    <button class="btn-action btn-vinavina" onclick="hikajy()">VINAVINA</button>
                </div>
            </div>
        </div>

        <div id="p-result" class="page">
            <h1 style="color:var(--red); margin-bottom: 25px;">BOSS BET</h1>
            <div class="signal-screen">
                <div class="lion-bg">🦁</div>
                <div class="live-tag">🎯 SIGNAL LIVE</div>
                <div style="font-size: 2.5rem; z-index: 1;">✈️</div>
                
                <div class="predicted-time" id="valiny-lera">00:00:00</div>
                
                <div id="badge-container" class="tour-badge tsara">
                    <span id="emoji-tour">🤍</span> <span id="text-tour">TOUR TSARA</span>
                </div>

                <div class="cotes-row">
                    <div style="color: var(--red);" id="c1">❤️ 1.53x</div>
                    <div style="color: #888;" id="c2">🖤 2.40x</div>
                    <div class="pink" id="c3">💜 100x</div>
                </div>
            </div>
            <button class="btn-hiverina" onclick="go('p-home')">HIVERINA</button>
        </div>

    </div>

    <nav>
        <div class="nav-item nav-active">🏠</div>
        <div class="nav-item">📊</div>
        <div class="nav-item">📜</div>
        <div class="nav-item">👤</div>
    </nav>

    <script>
        let focus = 'time';
        let tData = ""; let hData = "";

        function go(pId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pId).classList.add('active');
        }

        function mifidy(t) {
            focus = t;
            document.getElementById('box-time').classList.toggle('selected', t === 'time');
            document.getElementById('box-hex').classList.toggle('selected', t === 'hex');
        }

        function press(v) {
            if(focus === 'time' && tData.length < 6) tData += v;
            else if(focus === 'hex' && hData.length < 6) hData += v;
            render();
        }

        function mamafa() {
            if(focus === 'time') tData = tData.slice(0, -1);
            else hData = hData.slice(0, -1);
            render();
        }

        function render() {
            let h = (tData.substring(0,2) || "HH").padEnd(2, ' ');
            let m = (tData.substring(2,4) || "MM").padEnd(2, ' ');
            let s = (tData.substring(4,6) || "SS").padEnd(2, ' ');
            document.getElementById('box-time').innerText = h + " : " + m + " : " + s;
            document.getElementById('box-hex').innerText = hData || "6 litera hex";
        }

        function hikajy() {
            if(tData.length < 4) { alert("Fenoy ny lera!"); return; }
            
            go('p-result');
            document.getElementById('valiny-lera').innerText = "-- : -- : --";

            setTimeout(() => {
                // 1. Lera Prediction
                let d = new Date();
                d.setMinutes(d.getMinutes() + Math.floor(Math.random() * 4) + 1);
                d.setSeconds(Math.floor(Math.random() * 60));
                document.getElementById('valiny-lera').innerText = 
                    d.getHours().toString().padStart(2,'0') + ":" + 
                    d.getMinutes().toString().padStart(2,'0') + ":" + 
                    d.getSeconds().toString().padStart(2,'0');

                // 2. Random Tour Logic (Miankina amin'ny sary)
                const types = [
                    { t: "TOUR TSARA", e: "🤍", c: "tour-badge tsara" },
                    { t: "TOUR VERT", e: "🟢", c: "tour-badge vert" },
                    { t: "RAFALE BLEU", e: "💙", c: "tour-badge bleu" },
                    { t: "TOUR RATSY", e: "🔴", c: "tour-badge ratsy" }
                ];
                const rand = types[Math.floor(Math.random() * types.length)];
                document.getElementById('text-tour').innerText = rand.t;
                document.getElementById('emoji-tour').innerText = rand.e;
                document.getElementById('badge-container').className = rand.c;

                // 3. Côtes
                document.getElementById('c1').innerText = "❤️ " + (Math.random() * 3 + 1.1).toFixed(2) + "x";
                document.getElementById('c2').innerText = "🖤 " + (Math.random() * 6 + 2).toFixed(2) + "x";
                document.getElementById('c3').innerText = "💜 " + [50, 100, 150, 200][Math.floor(Math.random()*4)] + "x";
            }, 1000);
        }
    </script>
</body>
</html>
