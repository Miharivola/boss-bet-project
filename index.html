<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Bet Pro - Ultimate Predictor</title>
    <style>
        :root { --red: #ff3131; --dark: #0a0a0a; --card: #161616; --grey: #222; --text: #ffffff; --green: #2ecc71; --orange: #f39c12; }
        .light-mode { --dark: #f0f0f0; --card: #ffffff; --grey: #e0e0e0; --text: #1a1a1a; }
        
        body { background: var(--dark); color: var(--text); font-family: 'Arial', sans-serif; margin: 0; padding: 0; transition: 0.3s; }
        .container { max-width: 450px; margin: auto; padding: 15px; padding-bottom: 90px; min-height: 100vh; text-align: center; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .theme-toggle { position: absolute; top: 15px; right: 15px; background: var(--grey); border: none; padding: 10px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; z-index: 1001; }

        /* Input Cards (Tsy nisy niova) */
        .card { background: var(--card); border-radius: 20px; padding: 25px 15px; border: 1px solid #333; margin-bottom: 20px; position: relative; }
        .label { font-size: 0.75rem; color: #888; margin-bottom: 10px; display: block; text-align: left; padding-left: 10px; }
        .input-box { background: rgba(0,0,0,0.1); padding: 18px; border-radius: 12px; margin-bottom: 15px; font-size: 1.5rem; border: 2px solid #333; color: var(--text); cursor: pointer; font-family: monospace; }
        .selected { border-color: var(--red); background: rgba(255, 49, 49, 0.05); }

        /* Keypad & Buttons (Tsy nisy niova) */
        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .key { background: var(--grey); padding: 18px 5px; border-radius: 12px; border: none; color: var(--text); font-weight: bold; font-size: 1.2rem; cursor: pointer; }
        .action-row { display: flex; gap: 10px; margin-top: 20px; }
        .btn-famafana { flex: 1; background: #555; color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; }
        .btn-vinavina { flex: 1.5; background: var(--red); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* PREDICTION STYLE (Nampiana Alerte) */
        .status-banner { background: var(--green); color: black; padding: 12px; border-radius: 10px; font-weight: bold; margin-bottom: 20px; }
        .alert-banner { background: var(--orange); color: black; padding: 10px; border-radius: 10px; font-weight: bold; margin-bottom: 15px; font-size: 0.8rem; display: none; }
        
        .pred-item { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 15px; margin-bottom: 12px; border: 1px solid #222; text-align: left; }
        .pred-top { display: flex; justify-content: space-between; align-items: center; }
        .pred-time { font-size: 1.8rem; font-weight: bold; color: var(--green); font-family: monospace; }
        .pred-badge { border: 1px solid var(--green); color: var(--green); padding: 3px 8px; border-radius: 6px; font-size: 0.65rem; font-weight: bold; }
        .pred-values { display: flex; gap: 15px; margin-top: 8px; font-weight: bold; font-size: 0.9rem; }
        .val-r { color: #ff4d4d; } .val-g { color: #888; } .val-p { color: #ff79c6; }
        .pred-tip { font-size: 0.7rem; color: #666; margin-top: 10px; font-style: italic; border-top: 1px solid #222; padding-top: 5px; }

        /* Nav (Tsy nisy niova) */
        nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: var(--dark); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { font-size: 1.6rem; cursor: pointer; opacity: 0.3; }
        .nav-active { opacity: 1; color: var(--red); }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>

    <div class="container">
        <div id="p-home" class="page active">
            <h2 style="color:var(--red); letter-spacing:2px;">BOSS BET PRO</h2>
            <div class="card">
                <span class="label">ORA FIAINGANA</span>
                <div id="box-time" class="input-box selected" onclick="mifidy('time')">17 : 35 : 00</div>
                <span class="label">SERVER HASH (HEX CODE)</span>
                <div id="box-hex" class="input-box" onclick="mifidy('hex')">15B69C</div>
                
                <div class="keypad">
                    <button class="key" onclick="press('1')">1</button><button class="key" onclick="press('2')">2</button><button class="key" onclick="press('3')">3</button><button class="key" onclick="press('A')">A</button>
                    <button class="key" onclick="press('4')">4</button><button class="key" onclick="press('5')">5</button><button class="key" onclick="press('6')">6</button><button class="key" onclick="press('B')">B</button>
                    <button class="key" onclick="press('7')">7</button><button class="key" onclick="press('8')">8</button><button class="key" onclick="press('9')">9</button><button class="key" onclick="press('C')">C</button>
                    <button class="key" onclick="press('D')">D</button><button class="key" onclick="press('0')">0</button><button class="key" onclick="press('E')">E</button><button class="key" onclick="press('F')">F</button>
                </div>
                <div class="action-row">
                    <button class="btn-famafana" onclick="mamafa()">FAFANA</button>
                    <button class="btn-vinavina" onclick="hikajy()">VINAVINA</button>
                </div>
            </div>
        </div>

        <div id="p-result" class="page">
            <div id="alert-zone" class="alert-banner">⚠️ LALAO MANGIDY - MIANDRASA 10 MIN</div>
            <div class="status-banner">✅🔥 PRÉDICTION VERT RAIKA</div>
            <div id="prediction-list"></div>
            <button style="width:100%; padding:15px; margin-top:20px; border-radius:12px; border:none; background:#444; color:white; font-weight:bold;" onclick="go('p-home', 'nav-home')">HIVERINA</button>
        </div>

        <div id="p-stats" class="page"><h2>CONSEILS & TIPS</h2></div>
        <div id="p-history" class="page"><h2>HISTORIQUE</h2><div id="hist-list"></div></div>
    </div>

    <nav>
        <div id="nav-home" class="nav-item nav-active" onclick="go('p-home', 'nav-home')">🏠</div>
        <div id="nav-stats" class="nav-item" onclick="go('p-stats', 'nav-stats')">📊</div>
        <div id="nav-target" class="nav-item" onclick="go('p-result', 'nav-target')">🎯</div>
        <div id="nav-hist" class="nav-item" onclick="go('p-history', 'nav-hist')">📜</div>
    </nav>

    <script>
        let focus = 'time'; let tData = "173500"; let hData = "15B69C";

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
        }

        function go(pId, nId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
            document.getElementById(pId).classList.add('active');
            if(nId) document.getElementById(nId).classList.add('nav-active');
        }

        function mifidy(t) { focus = t; }
        function press(v) { if(focus === 'time' && tData.length < 6) tData += v; else if(hData.length < 6) hData += v; renderInput(); }
        function mamafa() { if(focus === 'time') tData = ""; else hData = ""; renderInput(); }
        function renderInput() {
            document.getElementById('box-time').innerText = tData.match(/.{1,2}/g)?.join(' : ') || "00 : 00 : 00";
            document.getElementById('box-hex').innerText = hData || "HEX CODE";
        }

        function hikajy() {
            const list = document.getElementById('prediction-list');
            const alertZone = document.getElementById('alert-zone');
            go('p-result', 'nav-target');
            
            // Randomly show alert for "Mangidy" based on Hex
            alertZone.style.display = (parseInt(hData, 16) % 3 === 0) ? 'block' : 'none';

            setTimeout(() => {
                list.innerHTML = "";
                for(let i=1; i<=3; i++) {
                    let seed = (parseInt(hData, 16) || 0) + Date.now() + (i * 500);
                    let d = new Date(); d.setMinutes(d.getMinutes() + (i * 3));
                    let timeStr = d.getHours().toString().padStart(2,'0')+":"+d.getMinutes().toString().padStart(2,'0')+":"+(seed%60).toString().padStart(2,'0');
                    
                    let tips = ["Fotoana tsara hidirana", "Tandremo ny manga misesy", "Aza adino ny Cashout"];
                    
                    list.innerHTML += `
                        <div class="pred-item">
                            <div class="pred-top">
                                <span class="pred-time">${timeStr}</span>
                                <span class="pred-badge">💚 TOUR VERT</span>
                            </div>
                            <div class="pred-values">
                                <span class="val-r">❤️ ${(10 + i).toFixed(2)}x</span>
                                <span class="val-g">🖤 ${(13 + i).toFixed(2)}x</span>
                                <span class="val-p">💖 ${(90 + i).toFixed(2)}x</span>
                            </div>
                            <div class="pred-tip">💡 ${tips[i-1]}</div>
                        </div>
                    `;
                }
            }, 1000);
        }
    </script>
</body>
</html>
