<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Bet Pro - Classic</title>
    <style>
        :root { --red: #ff3131; --dark: #0a0a0a; --card: #161616; --grey: #222; --text: #ffffff; --green: #2ecc71; }
        body { background: var(--dark); color: var(--text); font-family: 'Arial', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 450px; margin: auto; padding: 15px; padding-bottom: 90px; text-align: center; }
        .page { display: none; }
        .active { display: block; }
        
        .card { background: var(--card); border-radius: 20px; padding: 25px 15px; border: 1px solid #333; margin-bottom: 20px; }
        .label { font-size: 0.75rem; color: #888; margin-bottom: 10px; display: block; text-align: left; padding-left: 10px; }
        .input-box { background: rgba(0,0,0,0.1); padding: 18px; border-radius: 12px; margin-bottom: 15px; font-size: 1.5rem; border: 2px solid #333; color: var(--text); cursor: pointer; font-family: monospace; }
        .selected { border-color: var(--red); }

        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .key { background: var(--grey); padding: 18px 5px; border-radius: 12px; border: none; color: var(--text); font-weight: bold; font-size: 1.2rem; cursor: pointer; }
        .btn-vinavina { width: 100%; background: var(--red); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px; }

        .status-banner { background: var(--green); color: black; padding: 12px; border-radius: 10px; font-weight: bold; margin-bottom: 20px; }
        .pred-item { background: white; border-radius: 15px; padding: 15px; margin-bottom: 12px; border: 1px solid #ddd; text-align: left; color: #333; }
        .pred-time { font-size: 1.8rem; font-weight: bold; color: var(--green); font-family: monospace; }
        .pred-badge { border: 1px solid var(--green); color: var(--green); padding: 3px 8px; border-radius: 6px; font-size: 0.65rem; font-weight: bold; float: right; }
        .pred-values { display: flex; gap: 15px; margin-top: 8px; font-weight: bold; font-size: 0.9rem; border-top: 1px solid #eee; padding-top: 8px; }
        .pred-tip { font-size: 0.7rem; color: #777; margin-top: 8px; font-style: italic; }

        nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: var(--dark); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        .nav-item { font-size: 1.6rem; cursor: pointer; opacity: 0.3; }
        .nav-active { opacity: 1; color: var(--red); }
    </style>
</head>
<body>

    <div class="container">
        <div id="p-home" class="page active">
            <h2 style="color:var(--red); letter-spacing:2px; margin-top:30px;">BOSS BET PRO</h2>
            <div class="card">
                <span class="label">ORA FIAINGANA</span>
                <div id="box-time" class="input-box selected" onclick="mifidy('time')">00 : 00 : 00</div>
                <span class="label">SERVER HASH (HEX)</span>
                <div id="box-hex" class="input-box" onclick="mifidy('hex')">15B69C</div>
                <div class="keypad">
                    <button class="key" onclick="press('1')">1</button><button class="key" onclick="press('2')">2</button><button class="key" onclick="press('3')">3</button><button class="key" onclick="press('A')">A</button>
                    <button class="key" onclick="press('4')">4</button><button class="key" onclick="press('5')">5</button><button class="key" onclick="press('6')">6</button><button class="key" onclick="press('B')">B</button>
                    <button class="key" onclick="press('7')">7</button><button class="key" onclick="press('8')">8</button><button class="key" onclick="press('9')">9</button><button class="key" onclick="press('C')">C</button>
                    <button class="key" onclick="press('D')">D</button><button class="key" onclick="press('0')">0</button><button class="key" onclick="press('E')">E</button><button class="key" onclick="press('F')">F</button>
                </div>
                <button class="btn-vinavina" onclick="hikajy()">VINAVINA</button>
            </div>
        </div>

        <div id="p-result" class="page">
            <div class="status-banner">✅🔥 PRÉDICTION VERT RAIKA</div>
            <div id="prediction-list"></div>
            <button style="width:100%; padding:15px; margin-top:20px; border-radius:12px; border:none; background:#444; color:white; font-weight:bold;" onclick="go('p-home', 'nav-home')">HIVERINA</button>
        </div>

        <div id="p-history" class="page">
            <h2 style="color:var(--red)">HISTORIQUE</h2>
            <div id="hist-list"></div>
        </div>
    </div>

    <nav>
        <div id="nav-home" class="nav-item nav-active" onclick="go('p-home', 'nav-home')">🏠</div>
        <div class="nav-item">📊</div>
        <div id="nav-target" class="nav-item" onclick="go('p-result', 'nav-target')">🎯</div>
        <div id="nav-hist" class="nav-item" onclick="go('p-history', 'nav-hist')">📜</div>
    </nav>

    <script>
        let focus = 'time'; let tData = ""; let hData = "15B69C"; let history = [];

        function go(pId, nId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
            document.getElementById(pId).classList.add('active');
            if(nId) document.getElementById(nId).classList.add('nav-active');
            if(pId === 'p-history') renderHistory();
        }

        function mifidy(t) { focus = t; document.getElementById('box-time').classList.toggle('selected', t==='time'); document.getElementById('box-hex').classList.toggle('selected', t==='hex'); }
        function press(v) { if(focus==='time' && tData.length<6) tData+=v; else if(focus==='hex' && hData.length<6) hData+=v; renderInput(); }
        function renderInput() { 
            document.getElementById('box-time').innerText = tData.match(/.{1,2}/g)?.join(' : ') || "00 : 00 : 00"; 
            document.getElementById('box-hex').innerText = hData || "HEX CODE"; 
        }

        function hikajy() {
            const list = document.getElementById('prediction-list');
            go('p-result', 'nav-target');
            list.innerHTML = "";
            for(let i=1; i<=3; i++) {
                let d = new Date(); d.setMinutes(d.getMinutes() + (i * 3));
                let timeStr = d.getHours().toString().padStart(2,'0')+":"+d.getMinutes().toString().padStart(2,'0')+":"+Math.floor(Math.random()*60).toString().padStart(2,'0');
                let tips = ["Fotoana tsara hidirana", "Tandremo ny manga misesy", "Aza adino ny Cashout"];
                let r = (11+i).toFixed(2); let g = (14+i).toFixed(2); let p = (91+i).toFixed(2);
                
                list.innerHTML += `
                    <div class="pred-item">
                        <span class="pred-badge">💚 TOUR VERT</span>
                        <div class="pred-time">${timeStr}</div>
                        <div class="pred-values">
                            <span style="color:#ff4d4d">❤️ ${r}x</span> <span style="color:#555">🖤 ${g}x</span> <span style="color:#ff79c6">💖 ${p}x</span>
                        </div>
                        <div class="pred-tip">💡 ${tips[i-1]}</div>
                    </div>`;
                history.unshift({time: timeStr, r: r, g: g, p: p});
            }
        }

        function renderHistory() {
            document.getElementById('hist-list').innerHTML = history.map(h => `
                <div class="pred-item" style="background:#161616; border-color:#333; color:white;">
                    <span class="pred-badge">💚 TOUR VERT</span>
                    <div class="pred-time" style="font-size:1.2rem;">${h.time}</div>
                    <div class="pred-values">
                        <span style="color:#ff4d4d">❤️ ${h.r}x</span> <span style="color:#888">🖤 ${h.g}x</span> <span style="color:#ff79c6">💖 ${h.p}x</span>
                    </div>
                </div>`).join('');
        }
    </script>
</body>
</html>
