<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Bet Pro - Final Fix</title>
    <style>
        :root { --red: #ff3131; --dark: #0a0a0a; --card: #161616; --grey: #222; --text: #ffffff; --green: #2ecc71; --blue: #3498db; --purple: #9b59b6; }
        body { background: var(--dark); color: var(--text); font-family: 'Arial', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .container { max-width: 450px; margin: auto; padding: 15px; padding-bottom: 100px; text-align: center; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Input Card */
        .card { background: var(--card); border-radius: 20px; padding: 25px 15px; border: 1px solid #333; margin-bottom: 20px; }
        .label { font-size: 0.75rem; color: #888; margin-bottom: 10px; display: block; text-align: left; padding-left: 10px; }
        .input-box { background: rgba(0,0,0,0.1); padding: 18px; border-radius: 12px; margin-bottom: 15px; font-size: 1.5rem; border: 2px solid #333; color: var(--text); cursor: pointer; font-family: monospace; text-align: center; }
        .selected { border-color: var(--red); box-shadow: 0 0 10px rgba(255,49,49,0.2); }

        /* Keypad */
        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .key { background: var(--grey); padding: 18px 5px; border-radius: 12px; border: none; color: var(--text); font-weight: bold; font-size: 1.2rem; cursor: pointer; }
        .key:active { background: #444; }
        
        .action-row { display: flex; gap: 10px; margin-top: 20px; }
        .btn-famafana { flex: 1; background: #555; color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-vinavina { flex: 1.5; background: var(--red); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* Pred Items */
        .pred-item { background: white; border-radius: 15px; padding: 15px; margin-bottom: 12px; text-align: left; color: #333; position: relative; }
        .pred-time { font-size: 1.8rem; font-weight: bold; font-family: monospace; display: block; }
        .pred-badge { position: absolute; top: 15px; right: 15px; padding: 3px 8px; border-radius: 6px; font-size: 0.65rem; font-weight: bold; border: 1px solid; }
        .pred-values { display: flex; gap: 10px; margin-top: 10px; font-weight: bold; font-size: 0.85rem; border-top: 1px solid #eee; padding-top: 8px; }

        /* Bottom Nav */
        nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 450px; background: var(--dark); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; z-index: 999; }
        .nav-item { font-size: 1.6rem; cursor: pointer; opacity: 0.3; transition: 0.3s; color: white; text-decoration: none; }
        .nav-active { opacity: 1; color: var(--red); }
    </style>
</head>
<body>

    <div class="container">
        <div id="p-home" class="page active">
            <h2 style="color:var(--red); letter-spacing:2px; margin-top:20px;">BOSS BET PRO</h2>
            <div class="card">
                <span class="label">ORA FIAINGANA (HH:MM)</span>
                <div id="box-time" class="input-box selected" onclick="mifidy('time')">00 : 00</div>
                <span class="label">SERVER HASH (HEX)</span>
                <div id="box-hex" class="input-box" onclick="mifidy('hex')">15B69C</div>
                
                <div class="keypad">
                    <button class="key" onclick="press('1')">1</button><button class="key" onclick="press('2')">2</button><button class="key" onclick="press('3')">3</button><button class="key" onclick="press('A')">A</button>
                    <button class="key" onclick="press('4')">4</button><button class="key" onclick="press('5')">5</button><button class="key" onclick="press('6')">6</button><button class="key" onclick="press('B')">B</button>
                    <button class="key" onclick="press('7')">7</button><button class="key" onclick="press('8')">8</button><button class="key" onclick="press('9')">9</button><button class="key" onclick="press('C')">C</button>
                    <button class="key" onclick="press('D')">D</button><button class="key" onclick="press('0')">0</button><button class="key" onclick="press('E')">E</button><button class="key" onclick="press('F')">F</button>
                </div>

                <div class="action-row">
                    <button class="btn-famafana" onclick="mamafa()">FAFANA</button>
                    <button class="btn-vinavina" onclick="hikajy()">VINAVINA</button>
                </div>
            </div>
        </div>

        <div id="p-result" class="page">
            <h3 style="color:var(--green); margin-bottom:20px;">🎯 VINAVINA VOALOHANY</h3>
            <div id="prediction-list"></div>
            <button style="width:100%; padding:15px; margin-top:10px; border-radius:12px; border:none; background:#333; color:white; font-weight:bold;" onclick="go('p-home', 'nav-home')">HIVERINA</button>
        </div>

        <div id="p-history" class="page">
            <h2 style="color:var(--red)">📜 HISTORIQUE</h2>
            <div id="hist-list"></div>
        </div>
        
        <div id="p-stats" class="page"><h2 style="color:var(--blue)">📊 STATISTICS</h2><p>Mbola eo am-panamboarana...</p></div>
    </div>

    <nav>
        <div id="nav-home" class="nav-item nav-active" onclick="go('p-home', 'nav-home')">🏠</div>
        <div id="nav-stats" class="nav-item" onclick="go('p-stats', 'nav-stats')">📊</div>
        <div id="nav-target" class="nav-item" onclick="go('p-result', 'nav-target')">🎯</div>
        <div id="nav-hist" class="nav-item" onclick="go('p-history', 'nav-hist')">📜</div>
    </nav>

    <script>
        let focus = 'time'; 
        let tData = ""; 
        let hData = "15B69C"; 
        let history = [];

        function go(pId, nId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
            document.getElementById(pId).classList.add('active');
            if(nId) document.getElementById(nId).classList.add('nav-active');
            if(pId === 'p-history') renderHistory();
        }

        function mifidy(t) { 
            focus = t; 
            document.getElementById('box-time').classList.toggle('selected', t==='time'); 
            document.getElementById('box-hex').classList.toggle('selected', t==='hex'); 
        }

        function press(v) { 
            if(focus==='time' && tData.length < 4) tData += v; 
            else if(focus==='hex' && hData.length < 6) hData += v; 
            renderInput(); 
        }

        function mamafa() { 
            if(focus==='time') tData = ""; 
            else hData = ""; 
            renderInput(); 
        }

        function renderInput() { 
            let displayTime = tData.match(/.{1,2}/g)?.join(' : ') || "00 : 00";
            document.getElementById('box-time').innerText = displayTime; 
            document.getElementById('box-hex').innerText = hData || "HEX CODE"; 
        }

        function hikajy() {
            const list = document.getElementById('prediction-list');
            go('p-result', 'nav-target');
            list.innerHTML = "";
            
            let seed = (parseInt(hData, 16) || 123) + (parseInt(tData) || 456);

            for(let i=1; i<=3; i++) {
                let calc = (seed + (i * 258)) % 100;
                let d = new Date(); 
                d.setMinutes(d.getMinutes() + (i * 4));
                let timeStr = d.getHours().toString().padStart(2,'0')+":"+d.getMinutes().toString().padStart(2,'0')+":"+(calc % 60).toString().padStart(2,'0');
                
                let label, col, r, g, p;

                if(calc < 25) { 
                    label = "RAFALE BLEU"; col = "#3498db"; 
                    r="1.02"; g="1.15"; p="1.30"; 
                } else if(calc > 85) { 
                    label = "TOUR VERT"; col = "#2ecc71"; 
                    r=(12.50 + (calc%5)).toFixed(2); g=(18.20 + (calc%10)).toFixed(2); p=(95.00 + (calc%4)).toFixed(2); 
                } else if(calc < 50) { 
                    label = "TOUR RATSY"; col = "#e74c3c"; 
                    r="1.10"; g="1.25"; p="1.45"; 
                } else {
                    label = "TOUR TSARA"; col = "#9b59b6"; 
                    r=(2.50 + (calc%2)).toFixed(2); g=(4.80 + (calc%3)).toFixed(2); p=(12.00 + (calc%5)).toFixed(2); 
                }

                let itemHtml = `
                    <div class="pred-item" style="border-left: 5px solid ${col}">
                        <span class="pred-badge" style="border-color:${col}; color:${col}">${label}</span>
                        <span class="pred-time" style="color:${col}">${timeStr}</span>
                        <div class="pred-values">
                            <span style="color:#ff4d4d">❤️ ${r}x</span> 
                            <span style="color:#555">🖤 ${g}x</span> 
                            <span style="color:#ff79c6">💖 ${p}x</span>
                        </div>
                    </div>`;
                list.innerHTML += itemHtml;
                history.unshift({time: timeStr, r: r, g: g, p: p, label: label, col: col});
            }
        }

        function renderHistory() {
            const hList = document.getElementById('hist-list');
            if(history.length === 0) {
                hList.innerHTML = "<p style='color:#666; margin-top:20px;'>Tsy mbola misy historique.</p>";
                return;
            }
            hList.innerHTML = history.slice(0, 10).map(h => `
                <div class="pred-item" style="background:#1a1a1a; border-left: 5px solid ${h.col}; color:white;">
                    <span class="pred-badge" style="border-color:${h.col}; color:${h.col}">${h.label}</span>
                    <span style="font-weight:bold; font-size:1.2rem; color:${h.col}">${h.time}</span>
                    <div class="pred-values" style="border-top-color:#333">
                        <span style="color:#ff4d4d">❤️ ${h.r}x</span> 
                        <span style="color:#888">🖤 ${h.g}x</span> 
                        <span style="color:#ff79c6">💖 ${h.p}x</span>
                    </div>
                </div>`).join('');
        }
    </script>
</body>
</html>
