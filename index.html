<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitana Tsara - Fixed Input</title>
    <style>
        :root { --red: #ff3131; --dark: #0a0a0a; --card: #161616; --grey: #222; --text: #ffffff; --green: #2ecc71; --blue: #3498db; --pink: #ff79c6; }
        body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .container { max-width: 450px; margin: auto; padding: 15px; padding-bottom: 120px; text-align: center; }
        .page { display: none; } .active { display: block; }
        
        /* INPUT SECTION */
        .card { background: var(--card); border-radius: 20px; padding: 20px 15px; border: 1px solid #333; margin-bottom: 20px; position: relative; z-index: 1; }
        .label { font-size: 0.8rem; color: #888; margin-bottom: 10px; display: block; text-align: left; font-weight: bold; }
        .input-box { background: rgba(0,0,0,0.5); padding: 18px; border-radius: 12px; margin-bottom: 15px; font-size: 1.8rem; border: 2px solid #444; color: var(--text); cursor: pointer; font-family: 'Courier New', monospace; letter-spacing: 2px; min-height: 40px; display: flex; align-items: center; justify-content: center; }
        .selected { border-color: var(--red); box-shadow: 0 0 10px var(--red); background: rgba(255,49,49,0.05); }

        /* KEYPAD SECTION - FIXED INTERACTION */
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; position: relative; z-index: 10; }
        .key { background: var(--grey); padding: 22px; border-radius: 12px; border: none; color: var(--text); font-weight: bold; font-size: 1.5rem; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .key:active { background: #444; transform: scale(0.95); }

        .btn-v { width: 100%; background: var(--red); color: white; border: none; padding: 20px; border-radius: 15px; font-weight: bold; font-size: 1.3rem; margin-top: 20px; cursor: pointer; z-index: 10; position: relative; }

        /* RESULT & HISTORIQUE */
        .p-item { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; text-align: left; color: #111; position: relative; border-left: 10px solid; }
        .p-time { font-size: 2.2rem; font-weight: 900; font-family: 'Courier New', monospace; color: #000; }
        .p-score { position: absolute; top: 15px; right: 15px; text-align: right; }
        .p-percent { font-size: 1.4rem; font-weight: 900; display: block; }
        .p-vals { display: flex; justify-content: space-between; margin-top: 15px; border-top: 1px dashed #ccc; padding-top: 10px; font-weight: bold; }

        /* NAVIGATION FIXED */
        nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 450px; background: #0d0d0d; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; z-index: 100; }
        .nav-i { font-size: 1.8rem; cursor: pointer; opacity: 0.3; color: white; padding: 10px; }
        .nav-active { opacity: 1; color: var(--red); }
    </style>
</head>
<body>
    <div class="container">
        <div id="p-home" class="page active">
            <h1 style="color:var(--red); letter-spacing:3px;">VITANA TSARA</h1>
            <div class="card">
                <span class="label">LERA (HH:MM)</span>
                <div id="box-time" class="input-box selected" onclick="mifidy('time')">00 : 00</div>
                <span class="label">COTE AMBONY (Ex: 5.10)</span>
                <div id="box-cote" class="input-box" onclick="mifidy('cote')">0.00</div>
                
                <div class="keypad">
                    <button class="key" onclick="press('1')">1</button>
                    <button class="key" onclick="press('2')">2</button>
                    <button class="key" onclick="press('3')">3</button>
                    <button class="key" onclick="press('4')">4</button>
                    <button class="key" onclick="press('5')">5</button>
                    <button class="key" onclick="press('6')">6</button>
                    <button class="key" onclick="press('7')">7</button>
                    <button class="key" onclick="press('8')">8</button>
                    <button class="key" onclick="press('9')">9</button>
                    <button class="key" onclick="press('.')">.</button>
                    <button class="key" onclick="press('0')">0</button>
                    <button class="key" onclick="mamafa()">⌫</button>
                </div>
                <button class="btn-v" onclick="hikajy()">ANALYZER SIGNAL</button>
            </div>
        </div>

        <div id="p-result" class="page">
            <h2 style="color:var(--green)">🎯 VINAVINA VOALOHANY</h2>
            <div id="prediction-list"></div>
            <button class="btn-v" style="background:#333;" onclick="go('p-home', 'nav-home')">HIVERINA</button>
        </div>

        <div id="p-history" class="page">
            <h2 style="color:var(--pink)">📜 HISTORIQUE RECENT</h2>
            <div id="history-list"></div>
        </div>
    </div>

    <nav>
        <div id="nav-home" class="nav-i nav-active" onclick="go('p-home', 'nav-home')">🏠</div>
        <div id="nav-target" class="nav-i" onclick="go('p-result', 'nav-target')">🎯</div>
        <div id="nav-hist" class="nav-i" onclick="go('p-history', 'nav-hist')">📜</div>
    </nav>

    <script>
        let focus = 'time', tData = "", cData = "", historyData = [];

        function go(pId, nId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-i').forEach(n => n.classList.remove('nav-active'));
            document.getElementById(pId).classList.add('active');
            if(nId) document.getElementById(nId).classList.add('nav-active');
            if(pId === 'p-history') renderHistory();
            window.scrollTo(0,0);
        }

        function mifidy(t) { 
            focus = t; 
            document.getElementById('box-time').classList.toggle('selected', t==='time'); 
            document.getElementById('box-cote').classList.toggle('selected', t==='cote'); 
        }

        function press(v) { 
            if(focus==='time' && tData.length < 4) tData += v; 
            else if(focus==='cote' && cData.length < 8) cData += v; 
            renderInput(); 
        }

        function mamafa() { 
            if(focus==='time') tData = tData.slice(0, -1); 
            else cData = cData.slice(0, -1); 
            renderInput(); 
        }

        function renderInput() {
            let tv = tData.length >= 3 ? tData.slice(0, 2) + " : " + tData.slice(2) : (tData || "00 : 00");
            document.getElementById('box-time').innerText = tv;
            document.getElementById('box-cote').innerText = cData || "0.00";
        }

        function hikajy() {
            if(!tData || !cData) return alert("Fenoy ny lera sy ny côte!");
            const list = document.getElementById('prediction-list');
            list.innerHTML = ""; 
            
            let val = parseFloat(cData);
            let timeBase = parseInt(tData);

            for(let i=1; i<=3; i++) {
                let seed = (val * (i + 0.73)) + (timeBase / (i + 0.19));
                let noise = Math.abs(Math.sin(seed) * 100);
                let confidence = Math.floor(45 + (noise % 53)); 
                
                let d = new Date();
                let wait = Math.floor((noise % 8) + (i * 6));
                d.setMinutes(d.getMinutes() + wait);
                let hourStr = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
                let secStr = (Math.floor(noise*10)%60).toString().padStart(2,'0');
                let fullTime = hourStr + ":" + secStr;

                let r = (1.90 + (noise / 45)).toFixed(2);
                let g = (4.50 + (noise / 12)).toFixed(2);
                let p = (confidence > 85) ? (80 + noise).toFixed(2) : (18.00 + (noise * 1.2)).toFixed(2);
                
                let label, col;
                if(confidence > 85) { label="TOP SIGNAL"; col="#2ecc71"; }
                else if(confidence > 65) { label="BON MOMENT"; col="#9b59b6"; }
                else { label="PRUDENCE"; col="#3498db"; r="1.18"; g="1.35"; p="2.10"; }

                let itemHTML = `
                    <div class="p-item" style="border-left-color:${col}">
                        <div class="p-score">
                            <span style="font-size:0.7rem; font-weight:800; color:${col}">${label}</span>
                            <span class="p-percent" style="color:${col}">${confidence}%</span>
                        </div>
                        <span class="p-time">${fullTime}</span>
                        <div class="p-vals">
                            <span style="color:var(--red)">❤️ x${r}</span>
                            <span style="color:#666">🖤 x${g}</span>
                            <span style="color:var(--pink)">💖 x${p}</span>
                        </div>
                    </div>`;
                
                list.innerHTML += itemHTML;
                historyData.unshift({html: itemHTML});
            }
            if(historyData.length > 20) historyData = historyData.slice(0, 20);
            go('p-result', 'nav-target');
        }

        function renderHistory() {
            const hList = document.getElementById('history-list');
            hList.innerHTML = historyData.length > 0 ? historyData.map(h => h.html).join('') : "<p style='opacity:0.5; margin-top:50px;'>Tsy mbola misy historique.</p>";
        }
    </script>
</body>
</html>
