<!DOCTYPE html>
<html>
<body style="background-color:black; color:red; text-align:center; font-family:sans-serif;">
    <h1>BOSS BET</h1>
    <p>ADMIN PREDICTOR</p>
    <div style="border: 2px solid red; padding: 20px; margin: 20px; border-radius: 20px;">
        <h2 id="isa" style="font-size: 50px;">1.00x</h2>
    </div>
    <button onclick="mivoaka()" style="background:red; color:white; padding: 15px; border-radius: 10px; border:none; width: 80%; font-weight:bold;">🎯 SIGNAL LIVE</button>
    
    <script>
        function mivoaka() {
            var vokatry = (Math.random() * 5 + 1).toFixed(2);
            document.getElementById("isa").innerHTML = vokatry + "x";
        }
    </script>
</body>
</html>
