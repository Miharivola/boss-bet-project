<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Bet Pro</title>
    <style>
        :root { --red: #ff3131; --dark: #121212; --card: #1e1e1e; --grey: #2a2a2a; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; padding: 0; text-align: center; overflow-x: hidden; }
        
        .container { max-width: 450px; margin: auto; padding-bottom: 90px; min-height: 100vh; }
        .page { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Form Predictor */
        .card { background: var(--card); border-radius: 20px; padding: 15px; border: 1px solid #333; margin-top: 10px; }
        .input-box { background: var(--grey); padding: 15px; border-radius: 10px; margin: 10px 0; font-family: monospace; font-size: 1.4rem; border: 2px solid transparent; cursor: pointer; color: #aaa; }
        .selected { border: 2px solid var(--red); background: #331a1a; color: white; }
        
        /* Keypad */
        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; }
        .key { background: #333; padding: 18px 5px; border-radius: 8px; border: none; color: white; font-weight: bold; font-size: 1.2rem; cursor: pointer; }
        .key:active { background: #555; }
        .btn-red { background: var(--red); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; font-size: 1rem; }

        /* Prediction Result Display */
        #prediction-result { display: none; margin-top: 20px; padding: 20px; border-radius: 15px; background: linear-gradient(145deg, #1e1e1e, #252525); border: 1px solid #444; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .plane-icon { font-size: 2.5rem; margin-bottom: 10px; display: block; }
        .res-x { font-size: 3.5rem; font-weight: bold; color: white; margin: 5px 0; text-shadow: 0 0 15px rgba(255, 49, 49, 0.5); }
        .res-label { color: var(--red); font-weight: bold; letter-spacing: 2px; font-size: 0.9rem; }

        /* Nav Bottom */
        nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: #1a1a1a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; z-index: 100; }
        .nav-item { font-size: 1.6rem; cursor: pointer; opacity: 0.3; transition: 0.3s; }
        .nav-active { opacity: 1; color: var(--red); transform: scale(1.1); }
    </style>
</head>
<body>

    <div class="container">
        <div id="p-home" class="page active">
            <h2 style="color:var(--red); margin-bottom: 5px;">BOSS BET</h2>
            <p style="font-size: 0.8rem; color: #888; margin-top: 0;">AVIATOR PREDICTOR</p>
            
            <div class="card">
                <small style="color:#888; font-weight: bold;">ORA FIAINGANA</small>
                <div id="box-time" class="input-box selected" onclick="mifidy('time')">HH : MM : SS</div>
                
                <small style="color:#888; font-weight: bold;">VOAN'NY SERVER (HEX)</small>
                <div id="box-hex" class="input-box" onclick="mifidy('hex')">6 litera hex</div>

                <div id="prediction-result">
                    <span class="res-label">SIGNAL LIVE</span>
                    <span class="plane-icon">✈️</span>
                    <div class="res-x" id="valiny-x">0.00x</div>
                    <small style="color: #666;">Andraso ny fiaingana manaraka</small>
                </div>
                
                <div id="keypad-section">
                    <div class="keypad">
                        <button class="key" onclick="press('1')">1</button><button class="key" onclick="press('2')">2</button><button class="key" onclick="press('3')">3</button><button class="key" onclick="press('4')">4</button>
                        <button class="key" onclick="press('5')">5</button><button class="key" onclick="press('6')">6</button><button class="key" onclick="press('7')">7</button><button class="key" onclick="press('8')">8</button>
                        <button class="key" onclick="press('9')">9</button><button class="key" onclick="press('0')">0</button><button class="key" onclick="press('A')">A</button><button class="key" onclick="press('B')">B</button>
                        <button class="key" onclick="press('C')">C</button><button class="key" onclick="press('D')">D</button><button class="key" onclick="press('E')">E</button><button class="key" onclick="press('F')">F</button>
                    </div>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <button class="btn-red" style="background:#444" onclick="mamafa()">FAFAFA</button>
                        <button class="btn-red" onclick="hikajy()">VINAVINA</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="p-stats" class="page">
            <h2 style="color:var(--red);">📊 STATISTIQUES</h2>
            <p>Mbola eo am-panamboarana...</p>
        </div>
    </div>

    <nav>
        <div id="nav-home" class="nav-item nav-active" onclick="go('p-home', 'nav-home')">🏠</div>
        <div id="nav-stats" class="nav-item" onclick="go('p-stats', 'nav-stats')">📊</div>
        <div id="nav-hist" class="nav-item">📜</div>
        <div id="nav-acc" class="nav-item">👤</div>
    </nav>

    <script>
        let focus = 'time';
        let tData = ""; let hData = "";

        function go(pId, nId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
            document.getElementById(pId).classList.add('active');
            document.getElementById(nId).classList.add('nav-active');
        }

        function mifidy(t) {
            focus = t;
            document.getElementById('box-time').classList.toggle('selected', t === 'time');
            document.getElementById('box-hex').classList.toggle('selected', t === 'hex');
        }

        function press(v) {
            if(focus === 'time' && tData.length < 6) tData += v;
            else if(focus === 'hex' && hData.length < 6) hData += v;
            render();
        }

        function mamafa() {
            if(focus === 'time') tData = tData.slice(0, -1);
            else hData = hData.slice(0, -1);
            // Rehefa mamafa dia manafina ny valiny teo aloha
            document.getElementById('prediction-result').style.display = 'none';
            document.getElementById('keypad-section').style.display = 'block';
            render();
        }

        function render() {
            let h = (tData.substring(0,2) || "HH");
            let m = (tData.substring(2,4) || "MM");
            let s = (tData.substring(4,6) || "SS");
            document.getElementById('box-time').innerText = h + " : " + m + " : " + s;
            document.getElementById('box-hex').innerText = hData || "6 litera hex";
        }

        function hikajy() {
            if(tData.length < 4) {
                alert("Ampidiro ny lera feno azafady!");
                return;
            }

            // Hanafina keypad ary hampiseho ny valiny
            document.getElementById('keypad-section').style.display = 'none';
            const resArea = document.getElementById('prediction-result');
            const resX = document.getElementById('valiny-x');
            
            resArea.style.display = 'block';
            resX.innerText = "---";

            // Fakana isa kisendrasendra (ohatra 1.00 hatramin'ny 10.00)
            setTimeout(() => {
                let randomVal = (Math.random() * (5.5 - 1.1) + 1.1).toFixed(2);
                resX.innerText = randomVal + "x";
            }, 1500);
        }
    </script>
</body>
</html>
