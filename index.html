<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Bet Pro</title>
    <style>
        :root { --red: #ff3131; --dark: #121212; --card: #1e1e1e; --grey: #2a2a2a; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; padding: 0; text-align: center; }
        
        .container { max-width: 450px; margin: auto; padding-bottom: 90px; }
        .page { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Form Predictor */
        .card { background: var(--card); border-radius: 20px; padding: 15px; border: 1px solid #333; margin-top: 10px; }
        .input-box { background: var(--grey); padding: 15px; border-radius: 10px; margin: 10px 0; font-family: monospace; font-size: 1.4rem; border: 2px solid transparent; cursor: pointer; }
        .selected { border: 2px solid var(--red); background: #331a1a; }
        
        /* Keypad */
        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; }
        .key { background: #333; padding: 18px 5px; border-radius: 8px; border: none; color: white; font-weight: bold; font-size: 1.2rem; cursor: pointer; }
        .key:active { background: #555; }
        .btn-red { background: var(--red); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }

        /* Stats & History */
        .stat-card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 5px solid var(--red); text-align: left; }
        .bar { background: #333; height: 8px; border-radius: 4px; margin: 5px 0; width: 100%; }
        .fill { background: var(--red); height: 100%; border-radius: 4px; }

        /* Nav Bottom */
        nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: #1a1a1a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; z-index: 100; }
        .nav-item { font-size: 1.6rem; cursor: pointer; opacity: 0.3; }
        .nav-active { opacity: 1; color: var(--red); }
    </style>
</head>
<body>

    <div class="container">
        <div id="p-home" class="page active">
            <h2 style="color:var(--red);">BOSS BET</h2>
            <div class="card">
                <small style="color:#888">ORA FIAINGANA</small>
                <div id="box-time" class="input-box selected" onclick="mifidy('time')">00 : 00 : 00</div>
                <small style="color:#888">VOAN'NY SERVER</small>
                <div id="box-hex" class="input-box" onclick="mifidy('hex')">HEX CODE</div>
                <div class="keypad">
                    <button class="key" onclick="press('1')">1</button><button class="key" onclick="press('2')">2</button><button class="key" onclick="press('3')">3</button><button class="key" onclick="press('4')">4</button>
                    <button class="key" onclick="press('5')">5</button><button class="key" onclick="press('6')">6</button><button class="key" onclick="press('7')">7</button><button class="key" onclick="press('8')">8</button>
                    <button class="key" onclick="press('9')">9</button><button class="key" onclick="press('0')">0</button><button class="key" onclick="press('A')">A</button><button class="key" onclick="press('B')">B</button>
                    <button class="key" onclick="press('C')">C</button><button class="key" onclick="press('D')">D</button><button class="key" onclick="press('E')">E</button><button class="key" onclick="press('F')">F</button>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button class="btn-red" style="background:#444" onclick="mamafa()">FAFAFA</button>
                    <button class="btn-red" onclick="alert('Mikaroka...')">VINAVINA</button>
                </div>
            </div>
        </div>

        <div id="p-stats" class="page">
            <h2 style="color:var(--red);">📊 STATS</h2>
            <div class="stat-card">🔴 TOUR RATSY (30%) <div class="bar"><div class="fill" style="width:30%"></div></div></div>
            <div class="stat-card">⚪ TOUR TSARA (25%) <div class="bar"><div class="fill" style="width:25%; background:white;"></div></div></div>
            <div class="stat-card">🟢 TOUR VERT (20%) <div class="bar"><div class="fill" style="width:20%; background:#2ecc71;"></div></div></div>
        </div>

        <div id="p-history" class="page">
            <h2 style="color:var(--red);">📜 HISTORIQUE</h2>
            <div class="stat-card"><b>08:42:57</b><br><small>❤️ 4.96x | 🖤 7.78x</small></div>
            <div class="stat-card"><b>08:43:56</b><br><small>❤️ 1.68x | 🖤 2.42x</small></div>
        </div>

        <div id="p-account" class="page">
            <h2 style="color:var(--red);">👤 MON COMPTE</h2>
            <div class="card">
                <div style="width:70px; height:70px; background:#444; border-radius:50%; margin:auto; border:2px solid var(--red); display:flex; align-items:center; justify-content:center; font-size:2rem;">B</div>
                <h3>Admin Boss Bet</h3>
                <p>Abonnement: <span style="color:var(--red)">Aktiva</span></p>
                <button class="btn-red" style="background:#444">DECONNEXION</button>
            </div>
        </div>
    </div>

    <nav>
        <div id="nav-home" class="nav-item nav-active" onclick="go('p-home', 'nav-home')">🏠</div>
        <div id="nav-stats" class="nav-item" onclick="go('p-stats', 'nav-stats')">📊</div>
        <div id="nav-hist" class="nav-item" onclick="go('p-history', 'nav-hist')">📜</div>
        <div id="nav-acc" class="nav-item" onclick="go('p-account', 'nav-acc')">👤</div>
    </nav>

    <script>
        let focus = 'time';
        let tData = ""; let hData = "";

        function go(pId, nId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
            document.getElementById(pId).classList.add('active');
            document.getElementById(nId).classList.add('nav-active');
        }

        function mifidy(t) {
            focus = t;
            document.getElementById('box-time').classList.toggle('selected', t === 'time');
            document.getElementById('box-hex').classList.toggle('selected', t === 'hex');
        }

        function press(v) {
            if(focus === 'time' && tData.length < 6) tData += v;
            else if(focus === 'hex' && hData.length < 6) hData += v;
            render();
        }

        function mamafa() {
            if(focus === 'time') tData = tData.slice(0, -1);
            else hData = hData.slice(0, -1);
            render();
        }

        function render() {
            let h = (tData.substring(0,2) || "00").padEnd(2, '0');
            let m = (tData.substring(2,4) || "00").padEnd(2, '0');
            let s = (tData.substring(4,6) || "00").padEnd(2, '0');
            document.getElementById('box-time').innerText = h + " : " + m + " : " + s;
            document.getElementById('box-hex').innerText = hData || "HEX CODE";
        }
    </script>
</body>
</html>
