<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Bet - Pro Predictor</title>
    <style>
        :root { --red: #ff3131; --dark: #121212; --card: #1e1e1e; --grey: #2a2a2a; }
        body { background-color: var(--dark); color: white; font-family: sans-serif; margin: 0; padding: 0; text-align: center; }
        .container { max-width: 450px; margin: auto; padding: 20px; padding-bottom: 80px; }
        .page { display: none; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Boaty azo kitihina */
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #333; }
        .input-box { 
            background: var(--grey); padding: 15px; border-radius: 10px; margin: 10px 0; 
            font-family: monospace; font-size: 1.4rem; border: 2px solid transparent; cursor: pointer;
        }
        .active-input { border: 2px solid var(--red); background: #2a1515; }
        
        /* Keypad */
        .keypad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px; }
        .key { background: #333; padding: 15px 5px; border-radius: 8px; border: none; color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        .key:active { background: #555; }
        .btn-red { background: var(--red); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .full-width { width: 100%; margin-top: 10px; font-size: 1.1rem; }

        /* Nav Bottom */
        nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: #1a1a1a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        .nav-item { font-size: 1.5rem; cursor: pointer; opacity: 0.5; }
        .nav-active { opacity: 1; transform: scale(1.1); }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="p-home" class="page active">
            <h2 style="color:var(--red); margin-bottom: 5px;">BOSS BET</h2>
            <p style="color:gray; font-size:0.8rem; margin-top:0;">AVIATOR PREDICTOR</p>

            <div class="card">
                <small style="color:#888">ORA FIAINGANA</small>
                <div id="box-time" class="input-box active-input" onclick="setFocus('time')">00 : 00 : 00</div>
                
                <small style="color:#888">VOAN'NY SERVER</small>
                <div id="box-hex" class="input-box" onclick="setFocus('hex')">6 litera hex</div>

                <div class="keypad">
                    <button class="key" onclick="typeIn('1')">1</button>
                    <button class="key" onclick="typeIn('2')">2</button>
                    <button class="key" onclick="typeIn('3')">3</button>
                    <button class="key" onclick="typeIn('4')">4</button>
                    <button class="key" onclick="typeIn('5')">5</button>
                    <button class="key" onclick="typeIn('6')">6</button>
                    <button class="key" onclick="typeIn('7')">7</button>
                    <button class="key" onclick="typeIn('8')">8</button>
                    <button class="key" onclick="typeIn('9')">9</button>
                    <button class="key" onclick="typeIn('0')">0</button>
                    <button class="key" onclick="typeIn('A')">A</button>
                    <button class="key" onclick="typeIn('B')">B</button>
                    <button class="key" onclick="typeIn('C')">C</button>
                    <button class="key" onclick="typeIn('D')">D</button>
                    <button class="key" onclick="typeIn('E')">E</button>
                    <button class="key" onclick="typeIn('F')">F</button>
                    
                    <button class="key btn-red" style="grid-column: span 2;" onclick="erase()">Fafana</button>
                    <button class="key" style="grid-column: span 2; background:#555" onclick="resetAll()">Foana</button>
                </div>

                <button class="btn-red full-width" onclick="showPrediction()">🎯 VINAVINA</button>
            </div>
        </div>

        <div id="p-result" class="page">
            <h2 id="timer-display" style="color:var(--red); font-size: 3rem; margin: 20px 0;">00:00:00</h2>
            <div class="card" style="border: 2px solid white;">
                <h1 id="vokatra-isa" style="font-size: 4rem; margin: 10px 0;">1.00x</h1>
                <p>TOUR TSARA</p>
            </div>
            <button class="btn-red full-width" onclick="go('p-home')">Hiverina</button>
        </div>

    </div>

    <nav>
        <div class="nav-item nav-active" onclick="go('p-home')">🏠</div>
        <div class="nav-item">📊</div>
        <div class="nav-item">📜</div>
        <div class="nav-item">👤</div>
    </nav>

    <script>
        let currentFocus = 'time';
        let timeData = "";
        let hexData = "";

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function setFocus(f) {
            currentFocus = f;
            document.getElementById('box-time').classList.toggle('active-input', f === 'time');
            document.getElementById('box-hex').classList.toggle('active-input', f === 'hex');
        }

        function typeIn(val) {
            if (currentFocus === 'time' && timeData.length < 6) {
                if(!isNaN(val)) timeData += val; // Isa ihany ny lera
            } else if (currentFocus === 'hex' && hexData.length < 6) {
                hexData += val;
            }
            render();
        }

        function erase() {
            if (currentFocus === 'time') timeData = timeData.slice(0, -1);
            else hexData = hexData.slice(0, -1);
            render();
        }

        function resetAll() {
            timeData = ""; hexData = ""; render();
        }

        function render() {
            let h = (timeData.substring(0,2) || "00").padEnd(2, '0');
            let m = (timeData.substring(2,4) || "00").padEnd(2, '0');
            let s = (timeData.substring(4,6) || "00").padEnd(2, '0');
            document.getElementById('box-time').innerText = `${h} : ${m} : ${s}`;
            document.getElementById('box-hex').innerText = hexData || "6 litera hex";
        }

        function showPrediction() {
            if(timeData.length < 6) { alert("Fenoy ny lera (6 isa)"); return; }
            go('p-result');
            let res = (Math.random() * 5 + 1.1).toFixed(2);
            document.getElementById('vokatra-isa').innerText = res + "x";
        }

        // Clock animation
        setInterval(() => {
            let d = new Date();
            document.getElementById('timer-display').innerText = d.toLocaleTimeString('fr-FR');
        }, 1000);
    </script>
</body>
</html>
