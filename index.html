<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tsara Vitana - Lera Mazava</title>
    <style>
        :root { --red: #ff3131; --dark: #0a0a0a; --card: #161616; --grey: #222; --text: #ffffff; --green: #2ecc71; --blue: #3498db; --pink: #ff79c6; }
        body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 450px; margin: auto; padding: 15px; padding-bottom: 100px; text-align: center; }
        .page { display: none; } .active { display: block; }
        
        /* CARD INPUT */
        .card { background: var(--card); border-radius: 20px; padding: 25px 15px; border: 1px solid #333; margin-bottom: 20px; }
        .label { font-size: 0.8rem; color: #aaa; margin-bottom: 8px; display: block; text-align: left; padding-left: 10px; font-weight: bold; }
        .input-box { background: rgba(0,0,0,0.5); padding: 22px; border-radius: 15px; margin-bottom: 15px; font-size: 2rem; border: 2px solid #444; color: var(--text); cursor: pointer; font-family: 'Courier New', monospace; letter-spacing: 3px; font-weight: 900; }
        .selected { border-color: var(--red); box-shadow: 0 0 15px rgba(255,49,49,0.2); }

        /* KEYPAD */
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .key { background: var(--grey); padding: 22px; border-radius: 15px; border: none; color: var(--text); font-weight: bold; font-size: 1.5rem; cursor: pointer; }
        .key:active { background: var(--red); }

        /* HISTORIQUE STYLING - ITO ILAY NORESOVINAO */
        .hist-item { background: #1a1a1a; border-radius: 15px; padding: 20px; margin-bottom: 12px; text-align: left; border-left: 10px solid; position: relative; }
        .hist-time { font-size: 2.2rem; font-weight: 900; font-family: 'Courier New', monospace; display: block; margin-bottom: 5px; }
        .hist-label { font-size: 0.9rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .hist-vals { display: flex; justify-content: space-between; margin-top: 15px; border-top: 1px solid #333; padding-top: 10px; font-weight: bold; }

        .btn-v { width: 100%; background: var(--red); color: white; border: none; padding: 20px; border-radius: 15px; font-weight: bold; font-size: 1.2rem; margin-top: 20px; cursor: pointer; }
        nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 450px; background: #0d0d0d; display: flex; justify-content: space-around; padding: 20px 0; border-top: 1px solid #222; }
        .nav-i { font-size: 1.8rem; cursor: pointer; opacity: 0.3; color: white; } .nav-active { opacity: 1; color: var(--red); }
    </style>
</head>
<body>
    <div class="container">
        <div id="p-home" class="page active">
            <h1 style="color:var(--red); letter-spacing:4px; margin-bottom:30px;">TSARA VITANA</h1>
            <div class="card">
                <span class="label">ORA FIAINGANA (HH : MM)</span>
                <div id="box-time" class="input-box selected" onclick="mifidy('time')">00 : 00</div>
                <span class="label">CÔTE AMBONY FARANY</span>
                <div id="box-cote" class="input-box" onclick="mifidy('cote')">0.00</div>
                <div class="keypad">
                    <button class="key" onclick="press('1')">1</button><button class="key" onclick="press('2')">2</button><button class="key" onclick="press('3')">3</button>
                    <button class="key" onclick="press('4')">4</button><button class="key" onclick="press('5')">5</button><button class="key" onclick="press('6')">6</button>
                    <button class="key" onclick="press('7')">7</button><button class="key" onclick="press('8')">8</button><button class="key" onclick="press('9')">9</button>
                    <button class="key" onclick="press('.')">.</button><button class="key" onclick="press('0')">0</button><button class="key" onclick="mamafa()">⌫</button>
                </div>
                <button class="btn-v" onclick="hikajy()">VINAVINA</button>
            </div>
        </div>

        <div id="p-history" class="page">
            <h2 style="color:var(--green); margin-bottom:20px;">📜 LERA SY VINAVINA</h2>
            <div id="hist-list"></div>
            <button class="btn-v" style="background:#333;" onclick="go('p-home', 'nav-home')">HIVERINA</button>
        </div>
    </div>

    <nav>
        <div id="nav-home" class="nav-i nav-active" onclick="go('p-home', 'nav-home')">🏠</div>
        <div id="nav-target" class="nav-i" onclick="go('p-history', 'nav-target')">🎯</div>
    </nav>

    <script>
        let focus = 'time', tData = "", cData = "", history = [];
        function go(pId, nId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-i').forEach(n => n.classList.remove('nav-active'));
            document.getElementById(pId).classList.add('active');
            if(nId) document.getElementById(nId).classList.add('nav-active');
        }
        function mifidy(t) { focus = t; document.getElementById('box-time').classList.toggle('selected', t==='time'); document.getElementById('box-cote').classList.toggle('selected', t==='cote'); }
        function press(v) { if(focus==='time' && tData.length<4) tData+=v; else if(focus==='cote' && cData.length<8) cData+=v; renderInput(); }
        function mamafa() { if(focus==='time') tData = tData.slice(0, -1); else cData = cData.slice(0, -1); renderInput(); }
        function renderInput() {
            let tv = tData.length >= 3 ? tData.slice(0, 2) + " : " + tData.slice(2) : (tData || "00 : 00");
            document.getElementById('box-time').innerText = tv;
            document.getElementById('box-cote').innerText = cData || "0.00";
        }

        function hikajy() {
            if(!tData || !cData) return alert("Fenoy aloha ny lera sy ny côte!");
            let coteNum = parseFloat(cData);
            let timeNum = parseInt(tData);
            history = []; // Clear current view
            
            for(let i=1; i<=5; i++) {
                let seed = (coteNum * (i + 2)) + (timeNum / (i + 1));
                let hash = Math.abs(Math.sin(seed) * 10000);
                let d = new Date();
                d.setMinutes(d.getMinutes() + (Math.floor(hash) % 10) + (i * 3));
                
                let timeStr = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0') + ":" + (Math.floor(hash)%60).toString().padStart(2,'0');
                let l, col, r, g, p;
                let chance = hash % 100;

                if(chance < 25) { l="RAFALE BLEU"; col="#3498db"; r="1.10"; g="1.20"; p="1.35"; }
                else if(chance > 75) { l="TOUR VERT"; col="#2ecc71"; r="12.50"; g="25.00"; p="115.00"; }
                else { l="TOUR TSARA"; col="#9b59b6"; r="2.15"; g="5.40"; p="18.80"; }

                history.push({time: timeStr, r: r, g: g, p: p, label: l, col: col});
            }
            renderHistory();
            go('p-history', 'nav-target');
        }

        function renderHistory() {
            document.getElementById('hist-list').innerHTML = history.map(h => `
                <div class="hist-item" style="border-left-color:${h.col}">
                    <span class="hist-label" style="color:${h.col}">${h.label}</span>
                    <span class="hist-time" style="color:${h.col}">${h.time}</span>
                    <div class="hist-vals">
                        <span style="color:var(--red)">❤️ ${h.r}x</span> 
                        <span style="color:#888">🖤 ${h.g}x</span> 
                        <span style="color:var(--pink)">💖 ${h.p}x</span>
                    </div>
                </div>`).join('');
        }
    </script>
</body>
</html>
