<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Bet Pro - Classic Fix</title>
    <style>
        :root { --red: #ff3131; --dark: #0a0a0a; --card: #161616; --grey: #222; --text: #ffffff; --green: #2ecc71; }
        body { background: var(--dark); color: var(--text); font-family: 'Arial', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 450px; margin: auto; padding: 15px; padding-bottom: 90px; text-align: center; }
        .page { display: none; }
        .active { display: block; }
        .card { background: var(--card); border-radius: 20px; padding: 25px 15px; border: 1px solid #333; margin-bottom: 20px; }
        .input-box { background: rgba(0,0,0,0.1); padding: 18px; border-radius: 12px; margin-bottom: 15px; font-size: 1.5rem; border: 2px solid #333; color: var(--text); cursor: pointer; font-family: monospace; text-align: center; }
        .selected { border-color: var(--red); }
        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .key { background: var(--grey); padding: 18px 5px; border-radius: 12px; border: none; color: var(--text); font-weight: bold; font-size: 1.2rem; cursor: pointer; }
        .action-row { display: flex; gap: 10px; margin-top: 20px; }
        .btn-famafana { flex: 1; background: #555; color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; }
        .btn-vinavina { flex: 1.5; background: var(--red); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; }
        .pred-item { background: white; border-radius: 15px; padding: 15px; margin-bottom: 12px; text-align: left; color: #333; }
        .pred-time { font-size: 1.8rem; font-weight: bold; color: var(--green); font-family: monospace; }
        nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: var(--dark); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        .nav-item { font-size: 1.6rem; opacity: 0.3; }
        .nav-active { opacity: 1; color: var(--red); }
    </style>
</head>
<body>
    <div class="container">
        <div id="p-home" class="page active">
            <h2 style="color:var(--red); letter-spacing:2px; margin-top:30px;">BOSS BET PRO</h2>
            <div class="card">
                <div id="box-time" class="input-box selected" onclick="mifidy('time')">00 : 00</div>
                <div id="box-hex" class="input-box" onclick="mifidy('hex')">15B69C</div>
                <div class="keypad">
                    <button class="key" onclick="press('1')">1</button><button class="key" onclick="press('2')">2</button><button class="key" onclick="press('3')">3</button><button class="key" onclick="press('A')">A</button>
                    <button class="key" onclick="press('4')">4</button><button class="key" onclick="press('5')">5</button><button class="key" onclick="press('6')">6</button><button class="key" onclick="press('B')">B</button>
                    <button class="key" onclick="press('7')">7</button><button class="key" onclick="press('8')">8</button><button class="key" onclick="press('9')">9</button><button class="key" onclick="press('C')">C</button>
                    <button class="key" onclick="press('D')">D</button><button class="key" onclick="press('0')">0</button><button class="key" onclick="press('E')">E</button><button class="key" onclick="press('F')">F</button>
                </div>
                <div class="action-row">
                    <button class="btn-famafana" onclick="mamafa()">FAFANA</button>
                    <button class="btn-vinavina" onclick="hikajy()">VINAVINA</button>
                </div>
            </div>
        </div>
        <div id="p-result" class="page">
            <div id="list"></div>
            <button style="width:100%; padding:15px; background:#444; color:white; border:none; border-radius:12px;" onclick="go('p-home')">HIVERINA</button>
        </div>
    </div>
    <script>
        let focus = 'time'; let tData = ""; let hData = "15B69C";
        function go(pId) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(pId).classList.add('active'); }
        function mifidy(t) { focus = t; document.getElementById('box-time').classList.toggle('selected', t==='time'); document.getElementById('box-hex').classList.toggle('selected', t==='hex'); }
        function press(v) { if(focus==='time' && tData.length<4) tData+=v; else if(focus==='hex' && hData.length<6) hData+=v; renderInput(); }
        function mamafa() { if(focus==='time') tData = ""; else hData = ""; renderInput(); }
        function renderInput() { document.getElementById('box-time').innerText = tData.match(/.{1,2}/g)?.join(' : ') || "00 : 00"; document.getElementById('box-hex').innerText = hData || "HEX CODE"; }
        function hikajy() {
            const list = document.getElementById('list'); go('p-result'); list.innerHTML = "";
            let seed = parseInt(hData, 16) || 1;
            for(let i=1; i<=3; i++) {
                let d = new Date(); d.setMinutes(d.getMinutes() + (i * 5));
                let timeStr = d.getHours().toString().padStart(2,'0')+":"+d.getMinutes().toString().padStart(2,'0')+":"+(seed % 60).toString().padStart(2,'0');
                let r = (10 + (seed % 3) + i).toFixed(2);
                list.innerHTML += `<div class="pred-item"><div class="pred-time">${timeStr}</div><div style="font-weight:bold">❤️ ${r}x | 🖤 ${(parseFloat(r)+2).toFixed(2)}x</div></div>`;
            }
        }
    </script>
</body>
</html>
