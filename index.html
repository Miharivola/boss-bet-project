<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Bet - Time Predictor</title>
    <style>
        :root { --red: #ff3131; --dark: #121212; --card: rgba(30, 30, 30, 0.9); }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; padding: 0; text-align: center; }
        
        .container { max-width: 450px; margin: auto; padding-bottom: 80px; }
        .page { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Predictor Style */
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #333; margin-top: 10px; }
        .input-box { background: #2a2a2a; padding: 15px; border-radius: 12px; margin: 10px 0; font-family: monospace; font-size: 1.4rem; border: 2px solid transparent; cursor: pointer; color: #aaa; }
        .selected { border-color: var(--red); background: #331a1a; color: white; }

        /* Keypad */
        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; }
        .key { background: #333; padding: 18px 5px; border-radius: 10px; border: none; color: white; font-weight: bold; font-size: 1.2rem; cursor: pointer; }
        .btn-red { background: var(--red); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; font-size: 1.1rem; }

        /* PEJY SIGNAL LIVE (Lera no mivoaka) */
        .signal-screen { 
            background: radial-gradient(circle, #2a1515, #121212); 
            border-radius: 25px; padding: 50px 10px; 
            border: 1px solid #444; position: relative; overflow: hidden;
            min-height: 350px; display: flex; flex-direction: column; justify-content: center;
        }
        .lion-bg { font-size: 10rem; opacity: 0.1; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 0; pointer-events: none; }
        .live-tag { background: var(--red); padding: 5px 15px; border-radius: 5px; font-size: 0.9rem; font-weight: bold; display: inline-block; margin-bottom: 20px; z-index: 1; align-self: center; letter-spacing: 1px; }
        
        /* Lera Valiny */
        .predicted-time { font-size: 4rem; font-weight: bold; color: var(--red); z-index: 1; margin: 15px 0; font-family: monospace; text-shadow: 0 0 20px rgba(255, 49, 49, 0.4); }
        .tour-status { border: 1px solid white; padding: 8px 25px; border-radius: 25px; display: inline-block; align-self: center; font-weight: bold; font-size: 1rem; z-index: 1; margin-top: 10px; }

        /* Nav Bottom */
        nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: #1a1a1a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; z-index: 100; }
        .nav-item { font-size: 1.6rem; cursor: pointer; opacity: 0.3; }
        .nav-active { opacity: 1; color: var(--red); }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="p-home" class="page active">
            <h2 style="color:var(--red); letter-spacing: 1px;">BOSS BET</h2>
            <div class="card">
                <small style="color:#888; font-weight: bold;">ORA FIAINGANA</small>
                <div id="box-time" class="input-box selected" onclick="mifidy('time')">00 : 00 : 00</div>
                <small style="color:#888; font-weight: bold;">VOAN'NY SERVER (HEX)</small>
                <div id="box-hex" class="input-box" onclick="mifidy('hex')">HEX CODE</div>
                
                <div class="keypad">
                    <button class="key" onclick="press('1')">1</button><button class="key" onclick="press('2')">2</button><button class="key" onclick="press('3')">3</button><button class="key" onclick="press('4')">4</button>
                    <button class="key" onclick="press('5')">5</button><button class="key" onclick="press('6')">6</button><button class="key" onclick="press('7')">7</button><button class="key" onclick="press('8')">8</button>
                    <button class="key" onclick="press('9')">9</button><button class="key" onclick="press('0')">0</button><button class="key" onclick="press('A')">A</button><button class="key" onclick="press('B')">B</button>
                    <button class="key" onclick="press('C')">C</button><button class="key" onclick="press('D')">D</button><button class="key" onclick="press('E')">E</button><button class="key" onclick="press('F')">F</button>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button class="btn-red" style="background:#444" onclick="mamafa()">FAFAFA</button>
                    <button class="btn-red" onclick="hikajy()">VINAVINA</button>
                </div>
            </div>
        </div>

        <div id="p-result" class="page">
            <h2 style="color:var(--red);">BOSS BET</h2>
            <div class="signal-screen">
                <div class="lion-bg">🦁</div>
                <div class="live-tag">🎯 SIGNAL LIVE</div>
                <div style="font-size: 1rem; z-index: 1; color: #aaa;">HIAINGA AMIN'NY:</div>
                <div class="predicted-time" id="valiny-lera">00:00:00</div>
                <div class="tour-status">🤍 TOUR TSARA</div>
            </div>
            <button class="btn-red" style="margin-top: 25px; background: #333;" onclick="go('p-home')">HIVERINA</button>
        </div>

        <div id="p-stats" class="page"><h2>📊 STATS</h2></div>
        <div id="p-history" class="page"><h2>📜 HISTORY</h2></div>
        <div id="p-account" class="page"><h2>👤 ACCOUNT</h2></div>

    </div>

    <nav>
        <div id="nav-home" class="nav-item nav-active" onclick="go('p-home', 'nav-home')">🏠</div>
        <div id="nav-stats" class="nav-item" onclick="go('p-stats', 'nav-stats')">📊</div>
        <div id="nav-hist" class="nav-item" onclick="go('p-history', 'nav-hist')">📜</div>
        <div id="nav-acc" class="nav-item" onclick="go('p-account', 'nav-acc')">👤</div>
    </nav>

    <script>
        let focus = 'time';
        let tData = ""; let hData = "";

        function go(pId, nId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            if(nId) {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
                document.getElementById(nId).classList.add('nav-active');
            }
            document.getElementById(pId).classList.add('active');
        }

        function mifidy(t) {
            focus = t;
            document.getElementById('box-time').classList.toggle('selected', t === 'time');
            document.getElementById('box-hex').classList.toggle('selected', t === 'hex');
        }

        function press(v) {
            if(focus === 'time' && tData.length < 6) tData += v;
            else if(focus === 'hex' && hData.length < 6) hData += v;
            render();
        }

        function mamafa() {
            if(focus === 'time') tData = tData.slice(0, -1);
            else hData = hData.slice(0, -1);
            render();
        }

        function render() {
            let h = (tData.substring(0,2) || "00").padEnd(2, '0');
            let m = (tData.substring(2,4) || "00").padEnd(2, '0');
            let s = (tData.substring(4,6) || "00").padEnd(2, '0');
            document.getElementById('box-time').innerText = h + " : " + m + " : " + s;
            document.getElementById('box-hex').innerText = hData || "HEX CODE";
        }

        function hikajy() {
            if(tData.length < 4) { alert("Fenoy ny lera!"); return; }
            
            const resLera = document.getElementById('valiny-lera');
            resLera.innerText = "IKAJIANA...";
            
            go('p-result');

            setTimeout(() => {
                // Eto isika manao lera prediction (Lera izao + 2 minitra ohatra)
                let d = new Date();
                d.setMinutes(d.getMinutes() + Math.floor(Math.random() * 5) + 1);
                d.setSeconds(Math.floor(Math.random() * 60));
                
                let h = d.getHours().toString().padStart(2, '0');
                let m = d.getMinutes().toString().padStart(2, '0');
                let s = d.getSeconds().toString().padStart(2, '0');
                
                resLera.innerText = h + ":" + m + ":" + s;
            }, 1200);
        }
    </script>
</body>
</html>
